<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Connexion - PharmaStock</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(135deg, #e9f2ff, #f8fbff);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Segoe UI", sans-serif;
    }

    .login-card {
      width: 100%;
      max-width: 420px;
      border-radius: 16px;
      border: none;
    }

    .logo {
      font-weight: 700;
      font-size: 1.4rem;
      color: #2c7be5;
    }

    .subtitle {
      font-size: 0.9rem;
      color: #6c757d;
    }

    .form-control:focus {
      border-color: #2c7be5;
      box-shadow: 0 0 0 0.2rem rgba(44, 123, 229, 0.15);
    }

    .btn-primary {
      background: #2c7be5;
      border: none;
    }

    .btn-primary:hover {
      background: #1a5edb;
    }

    .input-group-text {
      background: #fff;
      cursor: pointer;
    }

    .loading-spinner {
      display: none;
      width: 18px;
      height: 18px;
      border: 2px solid #fff;
      border-top: 2px solid transparent;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#2c7be5">
<link rel="apple-touch-icon" href="/assets/img/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
</head>

<body>

<div class="card shadow login-card p-4">
  
  <div class="text-center mb-4">
    <div class="logo">
      <i class="fa-solid fa-capsules"></i> PharmaStock
    </div>
    <div class="subtitle">Gestion de stock pharmaceutique</div>
  </div>

  <!-- LOGIN -->
  <div class="mb-3">
    <label class="form-label">Identifiant</label>
    <div class="input-group">
      <span class="input-group-text"><i class="fa-solid fa-user"></i></span>
      <input type="text" id="login" class="form-control" placeholder="Entrez votre identifiant" autocomplete="username">
    </div>
  </div>

  <!-- PASSWORD -->
  <div class="mb-4">
    <label class="form-label">Mot de passe</label>
    <div class="input-group">
      <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
      <input type="password" id="password" class="form-control" autocomplete="current-password">
      <span class="input-group-text" id="toggle-password">
        <i class="fa-solid fa-eye"></i>
      </span>
    </div>
  </div>

  <!-- BUTTON -->
  <button id="btn-login" class="btn btn-primary w-100 d-flex align-items-center justify-content-center gap-2">
    <span id="btn-text">Se connecter</span>
    <div class="loading-spinner" id="spinner"></div>
  </button>

</div>

<script src="./assets/js/notifications.js"></script>

<script>
const API = '../api';
const notify = new NotificationSystem({ position: 'top-right', duration: 4000 });

const btn = document.getElementById('btn-login');
const spinner = document.getElementById('spinner');
const btnText = document.getElementById('btn-text');
const passwordInput = document.getElementById('password');
const togglePassword = document.getElementById('toggle-password');
const toggleIcon = togglePassword.querySelector('i');

// 👁️ toggle password
togglePassword.addEventListener('click', () => {
  const isPassword = passwordInput.type === 'password';
  passwordInput.type = isPassword ? 'text' : 'password';

  toggleIcon.classList.toggle('fa-eye');
  toggleIcon.classList.toggle('fa-eye-slash');
});

// Auto redirect si déjà connecté
if (localStorage.getItem('jwt')) {
  window.location = '/views/dashboard.html';
}

// Enter = submit
document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') btn.click();
});

btn.addEventListener('click', async () => {
  const login = document.getElementById('login').value.trim();
  const password = passwordInput.value;

  if (!login || !password) {
    notify.warning('Champs manquants', 'Veuillez remplir tous les champs.');
    return;
  }

  btn.disabled = true;
  spinner.style.display = 'inline-block';
  btnText.textContent = 'Connexion...';

  try {
    const res = await fetch(`${API}/login.php`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ login, password }),
    });

    let data;
    try {
      data = await res.json();
    } catch {
      throw new Error("Réponse invalide");
    }

    if (!res.ok) {
      notify.error('Erreur', data.error || 'Identifiants invalides');
      return;
    }

    localStorage.setItem('jwt', data.token);
    localStorage.setItem('user', JSON.stringify(data.user));

    notify.success('Succès', 'Connexion réussie');

    setTimeout(() => {
      window.location = '/views/dashboard.html';
    }, 500);

  } catch (err) {
    notify.error('Erreur serveur', 'Serveur injoignable');
  } finally {
    btn.disabled = false;
    spinner.style.display = 'none';
    btnText.textContent = 'Se connecter';
  }
});
</script>

</body>
</html>
