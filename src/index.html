<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Connexion</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <style>
    body { background: #f5f5f5; }
    .card { max-width: 380px; margin: 100px auto; }
  </style>
</head>
<body>

<div class="card shadow-sm">
  <div class="card-body p-4">
    <h5 class="card-title mb-4">Connexion</h5>

    <div class="mb-3">
      <label for="login" class="form-label">Login</label>
      <input type="text" id="login" class="form-control" placeholder="votre_login" autocomplete="username">
    </div>

    <div class="mb-4">
      <label for="password" class="form-label">Mot de passe</label>
      <input type="password" id="password" class="form-control" autocomplete="current-password">
    </div>

    <button id="btn-login" class="btn btn-dark w-100">Se connecter</button>
  </div>
</div>

<script src="./assets/js/notifications.js"></script>
<script>
  const API = '../api'; // adapter si besoin
  const notify = new NotificationSystem({ position: 'top-right', duration: 4000 });

  // Redirige si déjà connecté
  if (localStorage.getItem('jwt')) window.location = '/views/dashboard.html';

  document.getElementById('btn-login').addEventListener('click', async () => {
    const login    = document.getElementById('login').value.trim();
    const password = document.getElementById('password').value;

    if (!login || !password) {
      notify.warning('Champs manquants', 'Veuillez remplir tous les champs.');
      return;
    }

    try {
      const res  = await fetch(`${API}/login.php`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ login, password }),
      });
      const data = await res.json();

      if (!res.ok) {
        notify.error('Erreur de connexion', data.error || 'Erreur de connexion.');
        return;
      }

      localStorage.setItem('jwt', data.token);
      localStorage.setItem('user', JSON.stringify(data.user));
      notify.success('Succès', 'Connexion réussie ! Redirection en cours...');
      setTimeout(() => {
        window.location = '/views/dashboard.html';
      }, 200);

    } catch (e) {
      notify.error('Erreur serveur', 'Impossible de contacter le serveur.');
    }
  });
</script>

</body>
</html>
