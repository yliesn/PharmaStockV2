<div class="container-fluid mt-5">
  <div id="alert" class="alert alert-danger d-none"></div>

  <div class="row mb-4">
    <div class="col-md-6">
      <div class="card shadow-sm">
        <div class="card-body p-4">
          <h6 class="card-title mb-3">Mon compte</h6>
          <dl class="row mb-0" id="user-info">
            <dd class="col-12 text-muted">Chargement…</dd>
          </dl>
        </div>
      </div>
    </div>
  </div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
  const API = '../api';
  const token = localStorage.getItem('jwt');
  if (!token) window.location = '../index.html';

  // Elements pour les actions
  const logoutBtn = document.getElementById('logoutBtn');
  const profileLink = document.getElementById('profileLink');
  const userMenuText = document.getElementById('userMenuText');

  // Logout
  logoutBtn.addEventListener('click', (e) => {
    e.preventDefault();
    localStorage.removeItem('jwt');
    localStorage.removeItem('user');
    window.location = '../index.html';
  });

  // Profile (à adapter selon votre besoin)
  profileLink.addEventListener('click', (e) => {
    e.preventDefault();
    // À faire : rediriger vers page profil ou afficher modal
    alert('Profil utilisateur - à implémenter');
  });

  // Pré-rempli depuis le localStorage (évite un flash)
  const cached = JSON.parse(localStorage.getItem('user') || '{}');
  if (cached.prenom) userMenuText.textContent = cached.prenom + ' ' + cached.nom;

  // Vérifie le token côté serveur et affiche les données fraîches
  (async () => {
    try {
      const res = await fetch(`${API}/user/me.php`, {
        headers: { 'Authorization': `Bearer ${token}` },
      });
      const data = await res.json();

      if (!res.ok) {
        localStorage.removeItem('jwt');
        window.location = '../index.html';
        return;
      }

      const u = data.user;
      userMenuText.textContent = u.prenom + ' ' + u.nom;
      document.getElementById('user-info').innerHTML = `
        <dt class="col-5">Nom</dt>           <dd class="col-7">${esc(u.nom)}</dd>
        <dt class="col-5">Prénom</dt>        <dd class="col-7">${esc(u.prenom)}</dd>
        <dt class="col-5">Login</dt>         <dd class="col-7">${esc(u.login)}</dd>
        <dt class="col-5">Rôle</dt>         <dd class="col-7">${esc(u.role)}</dd>
        <dt class="col-5">Actif</dt>        <dd class="col-7">${u.actif ? 'Oui' : 'Non'}</dd>
        <dt class="col-5">Dernière co</dt> <dd class="col-7">${esc(u.date_derniere_connexion || '-')}</dd>
      `;

      // Charge la liste des utilisateurs
      loadUsers();

    } catch (e) {
      showAlert('Erreur réseau.');
      console.error(e);
    }
  })();

  // Fonction pour échapper les caractères HTML
  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }


</script>
</body>
</html>
