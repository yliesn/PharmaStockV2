<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Saisir Inventaire - PharmaStock</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../../assets/css/nav.css">
  <style>
    .progress-indicator {
      background: linear-gradient(90deg, #0d6efd 0%, #0d6efd 0%, #e9ecef 0%);
    }
    .product-card {
      border: 2px solid #e9ecef;
      border-radius: 12px;
      padding: 2rem;
      background: white;
      transition: all 0.3s ease;
      animation: slideIn 0.4s ease;
    }
    .product-card:hover {
      border-color: #0d6efd;
      box-shadow: 0 8px 20px rgba(13, 110, 253, 0.15);
    }
    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .product-ref {
      font-size: 0.9rem;
      color: #6c757d;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 0.5rem;
    }
    .product-title {
      font-size: 1.4rem;
      font-weight: bold;
      color: #333;
      margin-bottom: 1rem;
    }
    .info-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
      margin-bottom: 2rem;
      padding-bottom: 2rem;
      border-bottom: 1px solid #e9ecef;
    }
    .info-item {
      display: flex;
      flex-direction: column;
    }
    .info-label {
      font-size: 0.85rem;
      color: #6c757d;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 0.5rem;
    }
    .info-value {
      font-size: 1.3rem;
      font-weight: 600;
      color: #333;
    }
    .info-value.theorique {
      color: #0d6efd;
    }
    .quantity-input {
      font-size: 1.25rem;
      font-weight: 600;
      text-align: center;
      border: 2px solid #0d6efd;
      padding: 1rem;
    }
    .quantity-input:focus {
      border-color: #0d6efd;
      box-shadow: 0 0 0 0.3rem rgba(13, 110, 253, 0.25);
    }
    .notes-input {
      border: 1px solid #e9ecef;
      border-radius: 6px;
      padding: 0.75rem;
    }
    .ecart-badge {
      display: inline-block;
      padding: 0.5rem 1rem;
      border-radius: 6px;
      font-weight: 600;
      margin-top: 0.5rem;
    }
    .ecart-zero {
      background-color: #d4edda;
      color: #155724;
    }
    .ecart-positive {
      background-color: #cfe2ff;
      color: #084298;
    }
    .ecart-negative {
      background-color: #f8d7da;
      color: #842029;
    }
    .navigation-buttons {
      display: flex;
      gap: 1rem;
      margin-top: 2rem;
      justify-content: space-between;
    }
    .progress-bar-custom {
      height: 8px;
      background: #e9ecef;
      border-radius: 10px;
      margin-bottom: 2rem;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #0d6efd, #0dcaf0);
      border-radius: 10px;
      transition: width 0.3s ease;
    }
    .step-counter {
      text-align: center;
      color: #6c757d;
      font-size: 0.9rem;
      margin-bottom: 1rem;
    }
  </style>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#2c7be5">
<link rel="apple-touch-icon" href="/assets/img/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom shadow-sm">
  <div class="container-fluid px-4">
    <a class="navbar-brand fs-4 fw-bold text-primary" href="../../views/dashboard.html">PharmaStock</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto me-auto">
        <li class="nav-item">
          <a class="nav-link active" href="history.html">Inventaire</a>
        </li>
      </ul>

      <ul class="navbar-nav">
        <li class="nav-item dropdown">
          <a class="nav-link dropdown-toggle" href="#" id="userDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
            <span id="userMenuText">Chargement…</span>
          </a>
          <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="userDropdown">
            <li><a class="dropdown-item" href="../../views/profile.html" id="profileLink">Mon profil</a></li>
            <li><hr class="dropdown-divider"></li>
            <li><a class="dropdown-item text-danger" href="#" id="logoutBtn">Déconnexion</a></li>
          </ul>
        </li>
      </ul>
    </div>
  </div>
</nav>

<div class="container-fluid mt-5">

  <!-- En-tête -->
  <div class="row mb-4">
    <div class="col-md-8">
      <div class="d-flex align-items-center gap-3">
        <a href="history.html" class="btn btn-sm btn-outline-secondary">← Retour</a>
        <div>
          <h2 class="fw-bold mb-1">
            <i class="fas fa-boxes text-success"></i> Saisie Inventaire
          </h2>
          <p class="text-muted mb-0">Comptez les quantités physiques pour chaque produit</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Conteneur de la card -->
  <div class="row">
    <div class="col-lg-8 mx-auto">
      
      <!-- Indicateur de progression -->
      <div class="step-counter">
        Produit <strong id="currentStep">1</strong> sur <strong id="totalSteps">0</strong>
      </div>

      <div class="progress-bar-custom">
        <div class="progress-bar-fill" id="progressBar" style="width: 0%"></div>
      </div>

      <!-- Card du produit actuel -->
      <div class="product-card" id="productCard">
        <div class="product-ref" id="refProduct">REF-001</div>
        <div class="product-title" id="titleProduct">Chargement...</div>

        <div class="info-row">
          <div class="info-item">
            <div class="info-label">Quantité Théorique</div>
            <div class="info-value theorique" id="qtyTheorique">0</div>
            <small class="text-muted">Stock selon le système</small>
          </div>
          <div class="info-item">
            <div class="info-label">Quantité Physique</div>
            <div class="form-group">
              <input 
                type="number" 
                class="form-control quantity-input" 
                id="qtyPhysique"
                min="0"
                placeholder="0"
              >
            </div>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Notes (optionnel)</label>
          <textarea 
            class="form-control notes-input" 
            id="notesProduct"
            rows="2"
            placeholder="Ex: Produit endommagé, périmé, etc."
          ></textarea>
        </div>

        <!-- Affichage de l'écart -->
        <div id="ecartDisplay"></div>

        <!-- Boutons de navigation -->
        <div class="navigation-buttons">
          <button class="btn btn-outline-secondary" id="btnPrevious" onclick="previousProduct()">
            <i class="fas fa-chevron-left"></i> Précédent
          </button>
          
          <div>
            <button class="btn btn-outline-primary" id="btnSave" onclick="saveAndNext()">
              Sauvegarder
            </button>
            <button class="btn btn-success d-none" id="btnNext" onclick="nextProduct()">
              Suivant <i class="fas fa-chevron-right"></i>
            </button>
            <button class="btn btn-primary d-none" id="btnFinish" onclick="goToSummary()">
              <i class="fas fa-check"></i> Voir Résumé
            </button>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../../assets/js/notifications.js"></script>
<script>
  const notify = new NotificationSystem({ position: 'top-right', duration: 5000 });
  const API_BASE = '/api';
  
  let inventaire_id = null;
  let lines = [];
  let currentIndex = 0;

  // Initialisation
  async function init() {
    const token = localStorage.getItem('jwt');
    if (!token) {
      window.location.href = '../../index.html';
      return;
    }

    const params = new URLSearchParams(window.location.search);
    inventaire_id = params.get('id');

    if (!inventaire_id) {
      notify.error('Erreur', 'ID inventaire manquant');
      setTimeout(() => window.location.href = 'history.html', 2000);
      return;
    }

    await loadInventoryData();
    updateUserMenu();
  }

  // Charger les données d'inventaire
  async function loadInventoryData() {
    try {
      const token = localStorage.getItem('jwt');
      const response = await fetch(`${API_BASE}/inventaires/get-lines.php?id=${inventaire_id}`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });

      if (!response.ok) throw new Error('Erreur lors du chargement');

      const data = await response.json();
      lines = data.lines;
      
      document.getElementById('totalSteps').textContent = lines.length;
      displayProduct(0);

    } catch (error) {
      console.error('Erreur:', error);
      notify.error('Erreur', error.message);
    }
  }

  // Afficher le produit actuel
  function displayProduct(index) {
    if (index < 0 || index >= lines.length) return;

    currentIndex = index;
    const product = lines[index];

    document.getElementById('refProduct').textContent = product.reference;
    document.getElementById('titleProduct').textContent = product.designation;
    document.getElementById('qtyTheorique').textContent = product.quantite_theorique;
    document.getElementById('qtyPhysique').value = product.quantite_physique || '';
    document.getElementById('notesProduct').value = product.commentaire || '';

    document.getElementById('currentStep').textContent = index + 1;

    // Mettre à jour la barre de progression
    const progress = ((index + 1) / lines.length) * 100;
    document.getElementById('progressBar').style.width = progress + '%';

    // Afficher l'écart si la quantité physique est saisie
    updateEcartDisplay();

    // Gérer les boutons
    document.getElementById('btnPrevious').style.display = index === 0 ? 'none' : 'block';
    
    if (index === lines.length - 1) {
      document.getElementById('btnNext').classList.add('d-none');
      document.getElementById('btnFinish').classList.remove('d-none');
    } else {
      document.getElementById('btnNext').classList.add('d-none');
      document.getElementById('btnFinish').classList.add('d-none');
    }

    // Focus sur l'input
    document.getElementById('qtyPhysique').focus();
  }

  // Mettre à jour l'affichage de l'écart
  function updateEcartDisplay() {
    const qtyPhysique = parseInt(document.getElementById('qtyPhysique').value) || 0;
    const qtyTheorique = parseInt(lines[currentIndex].quantite_theorique);
    const ecart = qtyPhysique - qtyTheorique;

    const ecartDisplay = document.getElementById('ecartDisplay');
    
    if (qtyPhysique === 0) {
      ecartDisplay.innerHTML = '';
      return;
    }

    let badgeClass = 'ecart-zero';
    let badgeText = 'Conforme ✓';

    if (ecart > 0) {
      badgeClass = 'ecart-positive';
      badgeText = `Surplus: +${ecart}`;
    } else if (ecart < 0) {
      badgeClass = 'ecart-negative';
      badgeText = `Manque: ${ecart}`;
    }

    ecartDisplay.innerHTML = `<span class="ecart-badge ${badgeClass}">${badgeText}</span>`;
  }

  // Gérer les entrées d'input
  document.getElementById('qtyPhysique').addEventListener('input', (e) => {
    updateEcartDisplay();
  });

  document.getElementById('qtyPhysique').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') {
      saveAndNext();
    }
  });

  // Sauvegarder et passer au suivant
  async function saveAndNext() {
    const qtyPhysique = document.getElementById('qtyPhysique').value;
    const notes = document.getElementById('notesProduct').value;

    if (qtyPhysique === '') {
      notify.warning('Attention', 'Veuillez saisir une quantité');
      return;
    }

    try {
      const token = localStorage.getItem('jwt');
      const response = await fetch(`${API_BASE}/inventaires/save-line.php`, {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${token}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          line_id: lines[currentIndex].id,
          quantite_physique: parseInt(qtyPhysique),
          commentaire: notes || null
        })
      });

      if (!response.ok) throw new Error('Erreur lors de la sauvegarde');

      const result = await response.json();
      lines[currentIndex] = result.line;

      if (currentIndex < lines.length - 1) {
        nextProduct();
      }

    } catch (error) {
      console.error('Erreur:', error);
      notify.error('Erreur', error.message);
    }
  }

  // Produit suivant
  function nextProduct() {
    if (currentIndex < lines.length - 1) {
      displayProduct(currentIndex + 1);
    }
  }

  // Produit précédent
  function previousProduct() {
    if (currentIndex > 0) {
      displayProduct(currentIndex - 1);
    }
  }

  // Aller au résumé
  function goToSummary() {
    // Sauvegarder le dernier produit d'abord
    const qtyPhysique = document.getElementById('qtyPhysique').value;
    const notes = document.getElementById('notesProduct').value;

    if (qtyPhysique === '') {
      notify.warning('Attention', 'Veuillez saisir une quantité pour le dernier produit');
      return;
    }

    window.location.href = `summary.html?id=${inventaire_id}`;
  }

  // Mises à jour de l'interface utilisateur
  async function updateUserMenu() {
    const token = localStorage.getItem('jwt');
    if (!token) return;

    const cached = JSON.parse(localStorage.getItem('user') || '{}');
    if (cached.prenom) {
      document.getElementById('userMenuText').textContent = cached.prenom + ' ' + cached.nom;
    }

    try {
      const response = await fetch(`${API_BASE}/user/me.php`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });

      if (response.ok) {
        const data = await response.json();
        const user = data.user;
        document.getElementById('userMenuText').textContent = user.prenom + ' ' + user.nom;
      }
    } catch (error) {
      console.error('Erreur:', error);
    }
  }

  // Déconnexion
  document.addEventListener('DOMContentLoaded', () => {
    const logoutBtn = document.getElementById('logoutBtn');
    if (logoutBtn) {
      logoutBtn.addEventListener('click', (e) => {
        e.preventDefault();
        localStorage.removeItem('jwt');
        window.location.href = '../../index.html';
      });
    }
  });

  init();
</script>
</body>
</html>
